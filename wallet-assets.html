<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayls Network | Wallet Setup</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 40px;
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
        }
        .logo-header {
            margin-bottom: 20px;
        }
        p {
            color: #a0a0a0;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .network-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }
        .btn-main {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: opacity 0.2s;
        }
        .btn-main:hover {
            opacity: 0.9;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .add-token-btn {
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .add-token-btn:hover {
            border-color: #F6851B;
        }
        .btn-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-header">
        <img src="https://raylsnetwork.github.io/brand-assets/rls-icon.svg" width="60" alt="Rayls">
    </div>

    <div class="network-section">
        <h2>Connect to Network</h2>
        <p>Add the Rayls Mainnet to your wallet to start transacting.</p>
        <button class="btn-main" onclick="addNetwork()">
            <img src="https://raylsnetwork.github.io/brand-assets/rls-icon.svg" class="btn-icon" alt="Rayls">
            Add Rayls Mainnet
        </button>
    </div>

    <div class="assets-section">
        <h3>Import Tokens</h3>
        <div class="button-group">
            <button class="add-token-btn" onclick="addToken('0xYOUR_RLS_CONTRACT_ADDRESS', 'RLS', 18, 'https://raylsnetwork.github.io/brand-assets/rls-icon.svg')">
                <img src="https://raylsnetwork.github.io/brand-assets/rls-icon.svg" class="btn-icon">
                Add $RLS Token
            </button>
            <button class="add-token-btn" onclick="addToken('0x0000000000000000000000000000000000000400', 'USDr', 18, 'https://raylsnetwork.github.io/brand-assets/USDr.svg')">
                <img src="https://raylsnetwork.github.io/brand-assets/USDr.svg" class="btn-icon">
                Add USDr Stablecoin
            </button>
        </div>
    </div>
</div>

<script>
  // Add Rayls Mainnet Function
  async function addNetwork() {
    if (window.ethereum) {
      try {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{
            chainId: '0x11CFD', // Hexadecimal of 72957
            chainName: 'Rayls Mainnet',
            nativeCurrency: {
              name: 'USDr',
              symbol: 'USDr',
              decimals: 18
            },
            rpcUrls: ['https://mainnet-rpc.rayls.com/'],
            blockExplorerUrls: ['https://mainnet-explorer.rayls.com/'],
            iconUrls: ['https://raylsnetwork.github.io/brand-assets/rls-icon.svg']
          }]
        });
      } catch (error) {
        console.error("Network add error", error);
      }
    } else {
      alert('MetaMask is not installed.');
    }
  }

  // Add Token Function
  async function addToken(address, symbol, decimals, image) {
    if (window.ethereum) {
      try {
        await window.ethereum.request({
          method: 'wallet_watchAsset',
          params: {
            type: 'ERC20',
            options: { address, symbol, decimals, image }
          }
        });
      } catch (error) {
        console.error("Token add error", error);
      }
    }
  }
</script>

</body>
</html>
